<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompaSSS OS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-green: #84c464;
        --primary-black: #040404;
        --primary-gray: #7c7c7c;
        --secondary-gray: #262626;
        --text-light: #ffffff;
      }

      body {
        background: var(--primary-black);
        min-height: 100vh;
        color: var(--text-light);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .navbar {
        background: var(--secondary-gray) !important;
        border-bottom: 3px solid var(--primary-green);
      }

      .navbar-brand {
        font-weight: bold;
        font-size: 1.5rem;
        color: var(--primary-green) !important;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .navbar-brand img {
        height: 40px;
        width: 40px;
        border-radius: 8px;
        object-fit: cover;
        border: 1px solid var(--primary-green);
      }

      .card {
        background: var(--secondary-gray);
        border: 1px solid #262626;
        border-radius: 15px;
        margin-top: 30px;
      }

      .card-header {
        background: linear-gradient(
          90deg,
          #1a1a1a 0%,
          var(--secondary-gray) 100%
        );
        border-bottom: 2px solid var(--primary-green);
        border-radius: 15px 15px 0 0 !important;
        padding: 20px;
      }

      .form-control,
      .form-select {
        background: var(--primary-black);
        border: 1px solid var(--primary-gray);
        color: var(--text-light);
        border-radius: 8px;
        padding: 12px 15px;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 0.2rem rgba(132, 196, 100, 0.25);
      }

      .form-label {
        color: var(--primary-green);
        font-weight: 500;
      }

      .btn-primary {
        background: var(--primary-green);
        border: none;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 8px;
        color: var(--primary-black);
      }

      .btn-secondary {
        background: transparent;
        border: 1px solid var(--primary-gray);
        color: var(--text-light);
        padding: 12px 24px;
        border-radius: 8px;
      }

      .user-avatar {
        width: 35px;
        height: 35px;
        background: var(--primary-green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary-black);
        font-weight: bold;
      }

      .os-info {
        background: rgba(132, 196, 100, 0.1);
        border: 1px solid var(--primary-green);
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
      }

      h4 {
        color: var(--primary-green);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/dashboard">
          <img
            src="{{ url_for('static', filename='img/logo.png') }}"
            alt="Logo"
          />
          CompaSSS
        </a>
        <div class="navbar-nav ms-auto">
          <div class="nav-item dropdown">
            <a
              class="nav-link dropdown-toggle"
              href="#"
              data-bs-toggle="dropdown"
            >
              <div style="display: flex; align-items: center; gap: 10px">
                <div class="user-avatar">{{ session.nome[0] | upper }}</div>
                <span>{{ session.nome }}</span>
              </div>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item" href="#">
                  <i class="fas fa-user me-2"></i>{{ session.username }}
                </a>
              </li>
              <li>
                <a class="dropdown-item" href="#">
                  <i class="fas fa-envelope me-2"></i>{{ session.email }}
                </a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item" href="/logout" style="color: #d63031">
                  <i class="fas fa-sign-out-alt me-2"></i>Sair
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-md-8 mx-auto">
          <div class="card">
            <div class="card-header">
              <h4 class="mb-0">
                {% if atividade %}
                <i class="fas fa-edit me-2"></i>EDITAR ATIVIDADE {% else %}
                <i class="fas fa-plus-circle me-2"></i>LANÇAR ATIVIDADE {% endif
                %}
              </h4>
            </div>
            <div class="card-body">
              <form method="POST">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Sistema...</label>
                    <select name="sistema" class="form-select" required>
                      <option value="">Selecione</option>
                      <option value="SDAI">SDAI</option>
                      <option value="BMS">BMS</option>
                      <option value="SCA">SCA</option>
                      <option value="SAI">SAI</option>
                      <option value="Telecom">Telecom</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Atividade...</label>
                    <select name="tipo" class="form-select" required>
                      <option value="">Selecione</option>
                      <option value="Manutenção Preventiva">
                        Manutenção Preventiva
                      </option>
                      <option value="Manutenção Corretiva">
                        Manutenção Corretiva
                      </option>
                      <option value="Acompanhamento">Acompanhamento</option>
                      <option value="Outros">Outros</option>
                    </select>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Título</label>
                  <input
                    type="text"
                    name="titulo"
                    class="form-control"
                    value="{{ atividade.titulo if atividade else '' }}"
                    required
                  />
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Data Inicial</label>
                    <input
                      type="date"
                      name="data_inicial"
                      class="form-control"
                      value="{{ atividade.data_inicial if atividade else '' }}"
                      required
                    />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Data Final</label>
                    <input
                      type="date"
                      name="data_final"
                      class="form-control"
                      value="{{ atividade.data_final if atividade else '' }}"
                    />
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Status...</label>
                  <select name="status" class="form-select" required>
                    <option value="À Fazer">À Fazer</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Concluído">Concluído</option>
                    <option value="Cancelado">Cancelado</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label class="form-label">Descrição técnica...</label>
                  <textarea name="descricao" class="form-control" rows="5">
{{ atividade.descricao if atividade else '' }}</textarea
                  >
                </div>

                {% if atividade %}
                <div class="os-info">
                  <strong style="color: var(--primary-green)"
                    >Número OS:</strong
                  >
                  {{ atividade.numero_os }}
                </div>
                {% endif %}

                <div class="d-flex justify-content-end">
                  <a href="/atividades" class="btn btn-secondary me-2"
                    >Cancelar</a
                  >
                  <button type="submit" class="btn btn-primary">
                    {{ 'ATUALIZAR' if atividade else 'SALVAR' }}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      {% if atividade %}
      document.querySelector('select[name="sistema"]').value = '{{ atividade.sistema }}';
      document.querySelector('select[name="tipo"]').value = '{{ atividade.tipo }}';
      document.querySelector('select[name="status"]').value = '{{ atividade.status }}';
      {% endif %}

      const dataInicial = document.querySelector('input[name="data_inicial"]');
      if (!dataInicial.value) {
          const today = new Date();
          const year = today.getFullYear();
          const month = String(today.getMonth() + 1).padStart(2, '0');
          const day = String(today.getDate()).padStart(2, '0');
          dataInicial.value = year + '-' + month + '-' + day;
      }
    </script>
  </body>
</html>

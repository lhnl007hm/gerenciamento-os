<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Usuários - Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-green: #84c464;
        --primary-black: #040404;
        --secondary-gray: #262626;
        --text-light: #ffffff;
      }
      body {
        background: var(--primary-black);
        color: var(--text-light);
      }
      .navbar {
        background: var(--secondary-gray) !important;
        border-bottom: 3px solid var(--primary-green);
      }
      .navbar-brand {
        color: var(--primary-green) !important;
        font-weight: bold;
      }
      .card {
        background: var(--secondary-gray);
        border-radius: 15px;
        margin-top: 20px;
      }
      .card-header {
        background: #1a1a1a;
        border-bottom: 2px solid var(--primary-green);
        color: var(--primary-green);
      }
      .table {
        color: var(--text-light);
      }
      .btn-success {
        background: var(--primary-green);
        border: none;
        color: var(--primary-black);
      }
      .btn-success:hover {
        background: #6ab04c;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/admin/dashboard"
          ><i class="fas fa-arrow-left me-2"></i>Voltar</a
        >
        <span class="navbar-text text-white">{{ session.nome }}</span>
      </div>
    </nav>

    <div class="container">
      <div class="d-flex justify-content-between align-items-center mt-4">
        <h2 style="color: var(--primary-green)">
          <i class="fas fa-users me-2"></i>Usuários
        </h2>
        <a href="/admin/usuarios/novo" class="btn btn-success"
          ><i class="fas fa-plus me-2"></i>Novo Usuário</a
        >
      </div>

      <div class="card">
        <div class="card-body">
          <table class="table table-dark table-hover">
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Contrato</th>
                <th>Role</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              {% for u in usuarios %}
              <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.nome }}</td>
                <td>{{ u.email or '-' }}</td>
                <td>{{ u.contrato_nome }}</td>
                <td>{{ u.role }}</td>
                <td>
                  {% if u.ativo %}
                  <span class="badge bg-success">Ativo</span>
                  {% else %}
                  <span class="badge bg-danger">Inativo</span>
                  {% endif %}
                </td>
                <td>
                  <a
                    href="/admin/usuarios/{{ u.id }}/editar"
                    class="btn btn-sm btn-outline-light me-1"
                    ><i class="fas fa-edit"></i
                  ></a>
                  <button
                    class="btn btn-sm btn-outline-danger"
                    onclick="excluir({{ u.id }})"
                  >
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function excluir(id) {
        if (confirm("Excluir este usuário?")) {
          fetch("/admin/usuarios/" + id + "/excluir", { method: "POST" })
            .then((r) => r.json())
            .then((d) => {
              if (d.success) location.reload();
              else alert(d.error);
            });
        }
      }
    </script>
  </body>
</html>
